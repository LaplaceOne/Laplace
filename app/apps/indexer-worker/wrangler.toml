# Cloudflare Worker: Laplace indexer (D1 + cron ingest + read API).
#
# COMMITTED TEMPLATE — config only, no secrets, database_id is a placeholder. For a public repo,
# keep real resource ids out of git: copy this to wrangler.prod.toml (gitignored), fill the id,
# and pass `-c wrangler.prod.toml` to wrangler. Secrets (e.g. an RPC URL with an API key) go via
# `wrangler secret put` — NEVER in this file.
#
#   1. wrangler d1 create laplace-indexer                 # → copy database_id into wrangler.prod.toml
#   2. wrangler d1 migrations apply laplace-indexer --remote -c wrangler.prod.toml
#   3. wrangler secret put LAPLACE_RPC_URL -c wrangler.prod.toml      # optional, dedicated RPC
#   4. wrangler deploy -c wrangler.prod.toml
# Then set the frontend's VITE_INDEXER_URL to the deployed worker URL.
name = "laplace-indexer"
main = "src/index.ts"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "laplace-indexer"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

# Ingest tick: poll the chain every 2 minutes.
[triggers]
crons = ["*/2 * * * *"]

[vars]
LAPLACE_CLUSTER = "devnet"
# For a dedicated RPC (recommended), prefer a secret over a plaintext var:
#   wrangler secret put LAPLACE_RPC_URL
