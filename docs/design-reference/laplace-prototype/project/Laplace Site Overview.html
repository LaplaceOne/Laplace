<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Laplace · Site overview</title>
<link rel="stylesheet" href="styles/anyui-tokens.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: var(--font-normal); }
  .bw { width: 100%; height: 100%; display: flex; flex-direction: column; background: #fff; }
  .bw__bar { height: 44px; flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 0 14px; background: #e9e9ee; border-bottom: 1px solid #d8d8df; }
  .bw__dots { display: flex; gap: 7px; }
  .bw__dots i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .bw__dots i:nth-child(1){ background:#ff5f57; } .bw__dots i:nth-child(2){ background:#febc2e; } .bw__dots i:nth-child(3){ background:#28c840; }
  .bw__url { flex: 1; height: 28px; background: #fff; border-radius: 8px; display: flex; align-items: center; gap: 8px; padding: 0 12px; font-family: var(--font-mono); font-size: 12px; color: #6a6a72; }
  .bw__url iconify-icon { font-size: 13px; color: #9a9aa2; }
  .bw iframe { flex: 1; width: 100%; border: 0; display: block; background: #fff; }
</style>
<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
function Browser({ url, src }) {
  return (
    <div className="bw">
      <div className="bw__bar">
        <div className="bw__dots"><i></i><i></i><i></i></div>
        <div className="bw__url"><iconify-icon icon="eva:lock-outline"></iconify-icon>{url}</div>
      </div>
      <iframe src={src} title={url} loading="lazy"></iframe>
    </div>
  );
}

const AW = 1340, AH = 880;

function App() {
  return (
    <DesignCanvas>
      <DCSection id="laplace" title="Laplace — Website & Console" subtitle="Built from the LaplaceOne/Laplace docs. Line-art direction · AnyUI design system. Theme persists across pages. Open a page fullscreen — the Console is fully interactive.">
        <DCArtboard id="home" label="Landing — index.html" width={AW} height={AH}>
          <Browser url="laplace.so" src="index.html" />
        </DCArtboard>
        <DCArtboard id="app" label="Console (interactive) — app.html" width={AW} height={AH}>
          <Browser url="laplace.so/app" src="app.html" />
        </DCArtboard>
        <DCArtboard id="docs" label="Docs — docs.html" width={AW} height={AH}>
          <Browser url="laplace.so/docs" src="docs.html" />
        </DCArtboard>
        <DCArtboard id="lab" label="Lab — lab.html" width={AW} height={AH}>
          <Browser url="laplace.so/lab" src="lab.html" />
        </DCArtboard>
        <DCArtboard id="registry" label="Registry (interactive) — registry.html" width={AW} height={AH}>
          <Browser url="laplace.so/registry" src="registry.html" />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
